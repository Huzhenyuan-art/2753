server:
  port: ${BACKEND_SERVER_PORT:8080}
  tomcat:
    max-swallow-size: -1
    max-http-form-post-size: -1

spring:
  application:
    name: user-manager
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 30MB

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.example.usermanager.entity
  configuration:
    map-underscore-to-camel-case: true
