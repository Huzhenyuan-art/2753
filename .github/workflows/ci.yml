name: CI/CD Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

env:
  COMPOSE_PROJECT_NAME: user-manager-ci
  MYSQL_ROOT_PASSWORD: ci_test_password_2024
  MYSQL_DATABASE: user_management
  JWT_SECRET: ci_test_jwt_secret_key_please_use_long_random_string
  SPRING_PROFILES_ACTIVE: test

jobs:
  lint-and-type-check:
    name: 代码检查与类型校验
    runs-on: ubuntu-latest
    steps:
      - name: Checkout代码
        uses: actions/checkout@v4

      - name: 设置Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 设置JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: 前端依赖安装与类型检查
        working-directory: frontend
        run: |
          npm ci
          npm run type-check

      - name: 后端编译检查
        working-directory: backend
        run: mvn -s settings.xml compile -B -q

  backend-tests:
    name: 后端自动化测试
    runs-on: ubuntu-latest
    needs: lint-and-type-check
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ci_test_password_2024
          MYSQL_DATABASE: user_management
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -pci_test_password_2024"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
          --character-set-server=utf8mb4
          --collation-server=utf8mb4_unicode_ci
    steps:
      - name: Checkout代码
        uses: actions/checkout@v4

      - name: 设置JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: 等待MySQL就绪
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -u root -pci_test_password_2024 --silent 2>/dev/null; then
              echo "MySQL is ready"
              break
            fi
            echo "Waiting for MySQL... attempt $i"
            sleep 2
          done

      - name: 初始化数据库
        run: |
          mysql -h 127.0.0.1 -u root -pci_test_password_2024 user_management < backend/src/main/resources/sql/init.sql

      - name: 运行后端测试
        working-directory: backend
        env:
          SPRING_DATASOURCE_URL: jdbc:mysql://127.0.0.1:3306/user_management?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
          SPRING_DATASOURCE_USERNAME: root
          SPRING_DATASOURCE_PASSWORD: ci_test_password_2024
          JWT_SECRET: ci_test_jwt_secret_key_please_use_long_random_string
        run: mvn -s settings.xml test -B

      - name: 上传测试报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: backend/target/surefire-reports/

  build-images:
    name: 构建Docker镜像
    runs-on: ubuntu-latest
    needs: [lint-and-type-check, backend-tests]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - name: Checkout代码
        uses: actions/checkout@v4

      - name: 设置Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 构建后端镜像
        uses: docker/build-push-action@v5
        with:
          context: backend
          file: backend/Dockerfile
          push: false
          load: true
          tags: user-manager-backend:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 构建前端镜像
        uses: docker/build-push-action@v5
        with:
          context: frontend
          file: frontend/Dockerfile
          push: false
          load: true
          tags: user-manager-frontend:ci-${{ github.sha }}
          build-args: |
            VITE_API_BASE_URL=/api
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-verify:
    name: 部署验证
    runs-on: ubuntu-latest
    needs: build-images
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - name: Checkout代码
        uses: actions/checkout@v4

      - name: 创建环境变量文件
        run: |
          cat > .env << 'EOF'
          COMPOSE_PROJECT_NAME=user-manager-ci
          MYSQL_ROOT_PASSWORD=ci_verify_password_2024
          MYSQL_DATABASE=user_management
          MYSQL_PUBLISH_PORT=13306
          BACKEND_PUBLISH_PORT=28080
          FRONTEND_PUBLISH_PORT=38080
          SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/user_management?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
          SPRING_DATASOURCE_USERNAME=root
          SPRING_DATASOURCE_PASSWORD=ci_verify_password_2024
          JWT_SECRET=ci_verify_jwt_secret_key_must_be_very_long_random_string_for_security
          SPRING_PROFILES_ACTIVE=production
          VITE_API_BASE_URL=/api
          TZ=Asia/Shanghai
          EOF

      - name: 启动服务栈
        run: docker compose up -d --build

      - name: 等待服务就绪
        run: |
          echo "等待MySQL健康..."
          for i in {1..60}; do
            if docker compose ps db 2>/dev/null | grep -q "healthy"; then
              echo "MySQL healthy"
              break
            fi
            sleep 5
          done

          echo "等待Backend健康..."
          for i in {1..60}; do
            if docker compose ps backend 2>/dev/null | grep -q "healthy"; then
              echo "Backend healthy"
              break
            fi
            sleep 5
          done

          echo "等待Frontend启动..."
          sleep 10

      - name: 验证后端健康检查
        run: |
          echo "验证 /actuator/health..."
          for i in {1..10}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:28080/actuator/health || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "后端健康检查通过 (HTTP $STATUS)"
              break
            fi
            echo "尝试 $i: 后端健康检查返回 $STATUS"
            sleep 5
          done
          if [ "$STATUS" != "200" ]; then
            echo "后端健康检查失败"
            exit 1
          fi

          echo "验证 /api/health..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:28080/api/health || echo "000")
          if [ "$STATUS" != "200" ]; then
            echo "API健康检查失败 (HTTP $STATUS)"
            exit 1
          fi
          echo "API健康检查通过"

          echo "验证 /api/health/detail..."
          curl -s http://localhost:28080/api/health/detail | head -c 500
          echo ""

      - name: 验证前端可访问
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:38080/ || echo "000")
          if [ "$STATUS" != "200" ]; then
            echo "前端访问失败 (HTTP $STATUS)"
            exit 1
          fi
          echo "前端访问通过 (HTTP $STATUS)"

      - name: 输出服务日志（失败时）
        if: failure()
        run: |
          echo "=== MySQL Logs ==="
          docker compose logs db --tail=50 || true
          echo "=== Backend Logs ==="
          docker compose logs backend --tail=100 || true
          echo "=== Frontend Logs ==="
          docker compose logs frontend --tail=50 || true

      - name: 清理服务
        if: always()
        run: docker compose down -v --remove-orphans
